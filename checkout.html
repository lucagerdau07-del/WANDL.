<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WANDL. | Kasse</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

    <!-- MQTT.js for Real-Time Signaling -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

    <style>
        main { padding-top: 120px; min-height: 80vh; background: var(--color-earth-50); }
        .checkout-container { max-width: 800px; margin: 0 auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: var(--shadow-sm); }
        .cart-items { border-bottom: 2px solid var(--color-earth-200); margin-bottom: 2rem; padding-bottom: 1rem; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--color-earth-100); }
        .cart-item:last-child { border-bottom: none; }
        .item-info h3 { font-size: 1.2rem; margin: 0; color: var(--color-earth-900); }
        .item-info p { color: var(--color-earth-600); margin: 0.2rem 0 0 0; }
        .item-price { font-weight: 600; font-size: 1.2rem; color: var(--color-olive-700); }
        .cart-total { display: flex; justify-content: space-between; align-items: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 2rem; }
        
        .checkout-form { display: flex; flex-direction: column; gap: 1rem; }
        .checkout-form input { padding: 1rem; border: 1px solid var(--color-earth-300); border-radius: var(--radius-sm); font-family: var(--font-body); font-size: 1rem; }
        .btn-order { background: var(--color-olive-500); color: white; border: none; padding: 1.2rem; font-size: 1.2rem; font-weight: bold; border-radius: var(--radius-sm); cursor: pointer; transition: background 0.3s ease; width: 100%; margin-top: 1rem; }
        .btn-order:hover { background: var(--color-olive-700); }
        .empty-cart-msg { text-align: center; padding: 3rem; color: var(--color-earth-600); }
    </style>
</head>
<body>
    <nav id="nav-main">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="WANDL. Logo" style="height: 30px;"></a>
            <ul class="nav-links">
                <li><a href="index.html">Zurück zur Startseite</a></li>
                <li><a href="shop.html">Zum Shop</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <div class="container">
            <div class="checkout-container">
                <h1 style="text-align: center; margin-bottom: 2rem; font-family: var(--font-display);">Kasse</h1>
                
                <div id="cart-content">
                    <div class="cart-items" id="cart-items-list">
                        <!-- Items rendered by JS -->
                    </div>
                    
                    <div class="cart-total" id="cart-total-display">
                        <span>Gesamtsumme:</span>
                        <span id="total-price">0,00 €</span>
                    </div>

                    <form id="checkoutForm" class="checkout-form">
                        <h3>Lieferadresse</h3>
                        <input type="text" placeholder="Vorname & Nachname" required>
                        <input type="text" placeholder="Straße & Hausnummer" required>
                        <input type="text" placeholder="PLZ & Ort" required>
                        <button type="submit" class="btn-order" id="btn-submit">Kostenpflichtig bestellen</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <script src="js/cart.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const cart = getCart();
            const cartItemsList = document.getElementById('cart-items-list');
            const cartContent = document.getElementById('cart-content');
            const totalPriceEl = document.getElementById('total-price');

            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="empty-cart-msg">
                        <h2>Dein Warenkorb ist leer.</h2>
                        <br>
                        <a href="shop.html" class="btn btn-primary">Zurück zum Shop</a>
                    </div>
                `;
                return;
            }

            let total = 0;
            cart.forEach(item => {
                const itemTotal = item.quantity * item.price;
                total += itemTotal;
                
                const itemEl = document.createElement('div');
                itemEl.className = 'cart-item';
                itemEl.innerHTML = `
                    <div class="item-info">
                        <h3>${item.name}</h3>
                        <p>Menge: ${item.quantity} | Einzelpreis: ${item.price.toFixed(2).replace('.', ',')} €</p>
                    </div>
                    <div class="item-price">${itemTotal.toFixed(2).replace('.', ',')} €</div>
                `;
                cartItemsList.appendChild(itemEl);
            });

            totalPriceEl.textContent = `${total.toFixed(2).replace('.', ',')} €`;

            // --- MQTT PITCH SIGNAL LOGIC ---
            // Verbinden mit öffentlichem MQTT Broker (WebSockets)
            const client = mqtt.connect('wss://test.mosquitto.org:8081/mqtt');
            const topic = 'wandl_pitch_signal_1337'; // Geheimes Topic
            
            client.on('connect', () => {
                console.log('Mit Live-Signal-Server verbunden.');
            });

            const checkoutForm = document.getElementById('checkoutForm');
            checkoutForm.addEventListener('submit', (e) => {
                e.preventDefault();
                
                const btn = document.getElementById('btn-submit');
                btn.textContent = 'Verarbeite...';
                btn.disabled = true;

                // Sende Signal an das Handy!
                client.publish(topic, 'ORDER_PLACED');

                // Simuliere Ladezeit, dann Weiterleitung
                setTimeout(() => {
                    clearCart();
                    window.location.href = 'success.html';
                }, 1000);
            });
        });
    </script>
</body>
</html>
